name = "uploadthing-mcp"
main = "src/worker.ts"
compatibility_date = "2025-06-18"
workers_dev = true
compatibility_flags = ["nodejs_compat"]

[vars]
# MCP protocol
MCP_PROTOCOL_VERSION = "2025-11-25"
MCP_TITLE = "UploadThing MCP Server"
MCP_VERSION = "1.0.0"
MCP_INSTRUCTIONS = "Use these tools to upload, list, and manage files on UploadThing."

# Auth flags (UploadThing uses its own token)
AUTH_ENABLED = "false"
AUTH_STRATEGY = "none"

# Environment
NODE_ENV = "development"

# Logging
LOG_LEVEL = "info"

# DO NOT store secrets in [vars]; set via `wrangler secret put`
#
# Required secret for UploadThing:
#   wrangler secret put UPLOADTHING_TOKEN

[[kv_namespaces]]
binding = "TOKENS"
# Create with: wrangler kv:namespace create TOKENS
# Replace with your KV namespace ID:
id = "YOUR_KV_NAMESPACE_ID"
